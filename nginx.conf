server {
    listen 80;
    server_name aurexviper.pro www.aurexviper.pro;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name aurexviper.pro www.aurexviper.pro;

    ssl_certificate     /etc/letsencrypt/live/aurexviper.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aurexviper.pro/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Backend API
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 10s;
    }

    # File uploads served by backend
    location /uploads/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # Frontend dev server (Vite)
    location / {
        proxy_pass         http://127.0.0.1:5173;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
